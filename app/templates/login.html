<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Papelería Prisma</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    /* Fondo cálido con degradado y animación sutil */
    body {
        background: linear-gradient(135deg, #fff8e1, #ffe0b2);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', sans-serif;
        animation: backgroundShift 15s infinite alternate;
    }

    @keyframes backgroundShift {
        0% { background-position: 0% 50%; }
        100% { background-position: 100% 50%; }
    }

    .card {
        border-radius: 20px;
        border: none;
        padding: 2rem;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
        background-color: #ffffff;
        transition: transform 0.3s, box-shadow 0.3s;
    }

    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.18);
    }

    .titulo {
        text-align: center;
        color: #6d4c41;
        font-weight: bold;
        margin-bottom: 0.5rem;
        font-size: 1.6rem;
    }

    .logo {
        font-size: 60px;
        text-align: center;
        margin-bottom: 0.5rem;
        animation: bounce 2s infinite;
    }

    @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }

    .btn-login {
        background-color: #ff9800;
        border: none;
        color: white;
        width: 100%;
        font-weight: bold;
        padding: 0.6rem;
        border-radius: 10px;
        transition: 0.3s;
    }

    .btn-login:hover {
        background-color: #fb8c00;
        transform: scale(1.05);
    }

    .input-group-text {
        background-color: #fff3e0;
        border: none;
        border-radius: 10px 0 0 10px;
        color: #6d4c41;
        font-size: 1.1rem;
    }

    input.form-control {
        border-radius: 0 10px 10px 0 !important;
        border: none !important;
        background-color: #fff8f1;
        font-size: 1rem;
    }

    .footer {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
        color: #888;
        letter-spacing: 0.5px;
    }

    .text-muted {
        font-size: 0.9rem;
    }
</style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">

            <div class="card">

                <div class="logo">📚🖊️</div>
                <h3 class="titulo">Papelería Prisma</h3>
                <p class="text-center text-muted">Inicia sesión para continuar</p>

                <form method="POST">

                    <div class="mb-3 input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input class="form-control" type="text" name="nombreusuario" placeholder="Usuario" required>
                    </div>

                    <div class="mb-3 input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input class="form-control" type="password" name="contrasenia" placeholder="Contraseña" required>
                    </div>

                    <button class="btn btn-login" type="submit">Ingresar</button>

                </form>

                <div class="footer">© 2026 Papelería Prisma</div>

            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
