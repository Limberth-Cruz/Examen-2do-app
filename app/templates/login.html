<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Papelería Prisma</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    body{
        background: linear-gradient(135deg,#fff8e1,#ffe0b2); /* colores cálidos tipo papelería */
        height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        font-family: 'Segoe UI', sans-serif;
    }

    .card{
        border-radius:20px;
        border:none;
        padding:2rem;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        background-color:white;
    }

    .titulo{
        text-align:center;
        color:#6d4c41; /* marrón cálido */
        font-weight:bold;
        margin-bottom:0.5rem;
    }

    .logo{
        font-size:50px;
        text-align:center;
        margin-bottom:0.5rem;
    }

    .btn-login{
        background-color:#ff9800; /* color naranja cálido */
        border:none;
        color:white;
        width:100%;
        font-weight:bold;
        padding:0.5rem;
        border-radius:10px;
        transition:0.3s;
    }

    .btn-login:hover{
        background-color:#fb8c00;
    }

    .input-group-text{
        background-color:#fff3e0;
        border:none;
        border-radius:10px 0 0 10px;
        color:#6d4c41;
    }

    input.form-control{
        border-radius:0 10px 10px 0 !important;
        border:none !important;
        background-color:#fff8f1;
    }

    .footer{
        text-align:center;
        margin-top:15px;
        font-size:14px;
        color:#888;
    }
</style>

</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">

            <div class="card">

                <div class="logo">📚🖊️</div> <!-- emojis de librería/papelería -->
                <h3 class="titulo">Papelería Prisma</h3>
                <p class="text-center text-muted">Inicia sesión para continuar</p>

                <form method="POST">

                    <div class="mb-3 input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input class="form-control" type="text" name="nombreusuario" placeholder="Usuario" required>
                    </div>

                    <div class="mb-3 input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input class="form-control" type="password" name="contrasenia" placeholder="Contraseña" required>
                    </div>

                    <button class="btn btn-login" type="submit">Ingresar</button>

                </form>

                <div class="footer">© 2026 Papelería Prisma</div>

            </div>

        </div>
    </div>
</div>

</body>
</html>
